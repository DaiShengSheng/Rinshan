stage: 1
model_preset: base

# 数据
data_dir: data/annotated
init_ckpt: checkpoints/stage1_base/stage1_migrated.pt  # 热启动权重（无断点时生效）
val_ratio: 0.02
shuffle_buffer: 20000

# 训练
lr: 1e-4
weight_decay: 0.1
warmup_steps: 500
total_steps: 200_000
batch_size: 1024          # eff_batch=6144，显存 ~32GB
grad_accum_steps: 6       # eff_batch=6144
max_grad_norm: 1.0

# Belief Net 权重
# belief_weight=1.0: BC loss ~0.4，belief BCE ~0.55
#   weight=0.3 时 belief 梯度仅占总梯度 ~30%，容易欠拟合
# belief_pos_weight=2.4: 有牌(29%) vs 无牌(71%)，正负比 ≈ 0.71/0.29 ≈ 2.4
belief_weight: 1.0
belief_pos_weight: 2.4

# 精度
dtype: bfloat16
amp: true
compile: true

# 保存 & 日志
save_dir: checkpoints/stage1_base
save_every: 5000
log_every: 100
val_every: 20000

# 设备
device: cuda
num_workers: 16
pin_memory: true
