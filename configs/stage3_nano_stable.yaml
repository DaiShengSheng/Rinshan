# Stage 3: 离线 IQL 强化学习（稳定版）

stage: 3
model_preset: nano
stage1_ckpt: checkpoints/stage1_nano/best.pt

data_dir: data/annotated_grp
val_ratio: 0.02
shuffle_buffer: 500

# 更保守的优化参数
lr: 1e-5
weight_decay: 0.01
warmup_steps: 500
total_steps: 20000
batch_size: 32
grad_accum_steps: 2
max_grad_norm: 0.5

target_update_every: 200

dtype: float32
amp: false

save_dir: checkpoints/stage3_nano_stable
save_every: 2000
log_every: 50
val_every: 500

device: cuda
num_workers: 0
