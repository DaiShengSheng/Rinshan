# Oracle 训练配置
# 目标：训练一个全信息 value predictor，作为 Stage2 蒸馏的教师
#
# 收敛标准：
#   oracle_bc < 0.15  （Stage1 是 0.40，Oracle 利用全信息后能压到 0.10-0.15）
#   val 连续 patience 次不改善则停止
#
# 完成后在 stage2_base.yaml 中指定：
#   oracle_ckpt: /path/to/oracle_base/best.pt

model_preset: base
# 用 Stage2 best.pt 初始化 — BC 已收敛到 93%，比 Stage1 少跑约 70k 步
stage1_ckpt:  /root/autodl-tmp/rinshan/checkpoints/stage2_base/best.pt

data_dir:     /root/autodl-tmp/rinshan/data/annotated_v4
val_ratio:    0.02
shuffle_buffer: 15000
seed: 42

# 损失权重
# bc_weight=1.0    : BC 是主任务，确保 Q 分布有区分度
# value_weight=1.0 : value regression 与 BC 同量级
#   → Oracle 既能预测人类动作，也能预测动作的真实价值
bc_weight:    1.0
value_weight: 0.1    # 第一轮 1.0 时 value loss 抢梯度，降到 0.1 让 bc 优先收敛

# 优化器
lr:           3e-5    # 续跑用更小的 lr，避免破坏已有表示
weight_decay: 0.01
warmup_steps: 200    # 续跑 warmup 短一些
total_steps:  130000  # 从 step=80000 续跑到 130000（再跑 50k 步）
batch_size:   640
grad_accum_steps: 1
max_grad_norm: 1.0

# 续跑控制
reset_scheduler: true  # 重置 lr scheduler，从 3e-5 重新 cosine 退火

# 精度
dtype:  bfloat16
amp:    true
compile: false

# 保存 & 日志
save_dir:   /root/autodl-tmp/rinshan/checkpoints/oracle_base
save_every: 5000
log_every:  100
val_every:  5000
patience:   10          # val 连续 10 次不改善则停止（约 50k 步容忍）

device:      cuda
num_workers: 16
