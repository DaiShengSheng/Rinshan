# Stage 3: 离线 IQL 强化学习（nano 配置，接 Stage1 nano）

stage: 3
model_preset: nano
stage1_ckpt: checkpoints/stage1_nano/best.pt
stage2_ckpt: checkpoints/stage2_best.pt

data_dir: data/annotated_grp
val_ratio: 0.02
shuffle_buffer: 2000

lr: 3e-5
weight_decay: 0.01
warmup_steps: 500
total_steps: 100_000
batch_size: 64
grad_accum_steps: 2
max_grad_norm: 1.0

cql_weight: 0.1
bc_weight: 0.2
reward_clip: 20.0
value_clip: 50.0
adv_clip: 20.0
awr_temperature: 3.0
awr_max_weight: 20.0
game_expectile: 0.95
hand_expectile: 0.70
game_reward_weight: 1.0
hand_reward_weight: 1.0

target_update_every: 100
arena_gate_games: 200
arena_parallel_games: 64
arena_gate_rank_delta_threshold: 0.0
arena_gate_baseline_ckpt: checkpoints/stage2_best.pt

dtype: float32
amp: false

save_dir: checkpoints/stage3_nano
save_every: 5000
log_every: 100
val_every: 2000

device: cuda
num_workers: 4
