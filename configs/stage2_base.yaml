# Stage 2: Oracle 蒸馏 (真 Oracle，annotated 数据含 opponent_hands)

stage: 2
model_preset: base
stage1_ckpt: checkpoints/stage1_base/best.pt

data_dir: data/annotated
val_ratio: 0.02
shuffle_buffer: 2000

lr: 1e-4
weight_decay: 0.01
warmup_steps: 500
total_steps: 50_000
batch_size: 512
grad_accum_steps: 1
max_grad_norm: 0.5

dtype: bfloat16
amp: true

save_dir: checkpoints/stage2_base
save_every: 5000
log_every: 100
val_every: 1000

device: cuda
num_workers: 16
