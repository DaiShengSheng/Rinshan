# Stage 2: Oracle 蒸馏
#
# 前置条件：必须先跑完 train_oracle.py
#   python scripts/train_oracle.py configs/oracle_base.yaml
#
# ── 收敛目标 ──────────────────────────────────────────────────
#   指标             起点(Stage1)   及格      目标      失败警告
#   val KL           ~1.24         < 0.50    < 0.30    > 0.80 不再降
#   val BC           ~1.38         < 0.80    < 0.50    Stage2训练中反弹升高
#   score(kl+0.3bc)  —             < 0.75    < 0.45    —
#
# score 是 early stopping 主指标（val_score = val_kl + 0.3 * val_bc）
# KL 是核心：衡量 Student 学到了多少 Oracle 的全信息视角
# BC  是约束：防止 KL loss 破坏 Student 原有的人类动作预测能力
# ─────────────────────────────────────────────────────────────

stage: 2
model_preset: base
stage1_ckpt:  /root/autodl-tmp/rinshan/checkpoints/stage1_base/best_v3.pt
oracle_ckpt:  /root/autodl-tmp/rinshan/checkpoints/oracle_base/best.pt

data_dir:    /root/autodl-tmp/rinshan/data/annotated_v4
val_ratio:   0.02
shuffle_buffer: 15000

belief_weight:     1.0
belief_pos_weight: 2.4

lr:           1e-4
weight_decay: 0.01
warmup_steps: 500
total_steps:  100000
batch_size:   640
grad_accum_steps: 1
max_grad_norm: 0.5
compile: false

dtype: bfloat16
amp:   true

save_dir:   /root/autodl-tmp/rinshan/checkpoints/stage2_base
save_every: 5000
log_every:  100
val_every:  5000
patience:   8

device:      cuda
num_workers: 16
