# Stage 2: Oracle 蒸馏 (真 Oracle，annotated 数据含 opponent_hands)

stage: 2
model_preset: base
stage1_ckpt: checkpoints/stage1_migrated.pt

data_dir: data/annotated
val_ratio: 0.02
shuffle_buffer: 15000

lr: 1e-4
weight_decay: 0.01
warmup_steps: 500
total_steps: 100_000
batch_size: 512
grad_accum_steps: 1
max_grad_norm: 0.5
compile: false

dtype: bfloat16
amp: true

save_dir: checkpoints/stage2_base
save_every: 5000
log_every: 100
val_every: 5000
patience: 8

# Oracle 蒸馏信号诊断 + 自动 fine-tune
# KL 低于此阈值时自动对 Oracle 做 BC fine-tune，再继续蒸馏
oracle_kl_threshold: 0.2
oracle_finetune_steps: 3000   # fine-tune 步数，信号极弱时可调大到 5000
oracle_finetune_lr: 2e-5      # fine-tune 学习率，比主训练低一个量级

device: cuda
num_workers: 16
