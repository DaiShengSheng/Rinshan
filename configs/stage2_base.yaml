# Stage 2: Oracle 蒸馏
#
# 前置条件：必须先跑完 train_oracle.py，oracle_bc 收敛到 < 0.15
#   python scripts/train_oracle.py configs/oracle_base.yaml
#
# 然后把 oracle_base/best.pt 的路径填到 oracle_ckpt

stage: 2
model_preset: base
stage1_ckpt:  /root/autodl-tmp/rinshan/checkpoints/stage1_base/best_v3.pt
oracle_ckpt:  /root/autodl-tmp/rinshan/checkpoints/oracle_base/best.pt

data_dir:    /root/autodl-tmp/rinshan/data/annotated_v4
val_ratio:   0.02
shuffle_buffer: 15000

belief_weight:     1.0
belief_pos_weight: 2.4

lr:           1e-4
weight_decay: 0.01
warmup_steps: 500
total_steps:  100000
batch_size:   640
grad_accum_steps: 1
max_grad_norm: 0.5
compile: false

dtype: bfloat16
amp:   true

save_dir:   /root/autodl-tmp/rinshan/checkpoints/stage2_base
save_every: 5000
log_every:  100
val_every:  5000
patience:   8

device:      cuda
num_workers: 16
