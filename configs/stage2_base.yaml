# Stage 2: Oracle 蒸馏
#
# 前置条件：必须先跑完 train_oracle.py
#   python scripts/train_oracle.py configs/oracle_base.yaml
#
# ── 收敛目标（training log 里的量级，temperature=2.0 软化后）──────
#   指标                  step~25k 实测  及格      目标      失败警告
#   val KL  (temp=2.0)    ~0.008        < 0.006   < 0.005   > 0.012 不再下降
#   val BC                ~0.187        < 0.185   < 0.180   反弹 > 0.25
#   score (kl+0.3*bc)     ~0.064        < 0.060   < 0.057   —（理论下限 ≈ 0.057）
#   bel_recall            ~0.785        > 0.820   > 0.850   < 0.750 说明 belief 未收敛
#
# 注：score 理论下限 = min_KL + 0.3×BC_floor ≈ 0 + 0.3×0.19 = 0.057
#     BC_floor 与 Oracle bc=0.20 相同，Student 已逼近全信息上限，正常现象。
#     bel_recall 是判断 BeliefNet 是否真正收敛的核心指标。
# ─────────────────────────────────────────────────────────────

stage: 2
model_preset: base
stage1_ckpt:  /root/autodl-tmp/rinshan/checkpoints/stage1_base/best_v3.pt
oracle_ckpt:  /root/autodl-tmp/rinshan/checkpoints/oracle_base/best.pt

data_dir:    /root/autodl-tmp/rinshan/data/annotated_v4
val_ratio:   0.02
shuffle_buffer: 15000

belief_weight:     1.0
belief_pos_weight: 2.4
wait_weight:       0.1   # wait_head 从零初始化，Stage2 先低权重预热，Stage3 再专训

lr:           1e-4
weight_decay: 0.01
warmup_steps: 500
total_steps:  100000
batch_size:   640
grad_accum_steps: 1
max_grad_norm: 0.5
compile: false

dtype: bfloat16
amp:   true

save_dir:   /root/autodl-tmp/rinshan/checkpoints/stage2_base
save_every: 5000
log_every:  100
val_every:  5000
patience:   8

device:      cuda
num_workers: 16
