# Stage 2: Oracle 蒸馏
#
# 前置条件：必须先跑完 train_oracle.py
#   python scripts/train_oracle.py configs/oracle_base.yaml
#
# ── 收敛目标（training log 里的量级，temperature=2.0 软化后）──────
#   指标                  step~7k 实测   及格      目标      失败警告
#   val KL  (temp=2.0)    ~0.05         < 0.03    < 0.01    > 0.05 不再下降
#   val BC                ~0.19         < 0.15    < 0.12    反弹 > 0.25
#   score (kl+0.3*bc)     ~0.07         < 0.05    < 0.04    —
#
# 注：diagnose_oracle.py 输出的 KL≈1.24 是未经 temperature 软化的原始值，
#     训练 log 里的 kl 已除以 temperature=2.0，两者不可直接对比。
#     score = val_kl + 0.3 * val_bc 是 early stopping 主指标。
# ─────────────────────────────────────────────────────────────

stage: 2
model_preset: base
stage1_ckpt:  /root/autodl-tmp/rinshan/checkpoints/stage1_base/best_v3.pt
oracle_ckpt:  /root/autodl-tmp/rinshan/checkpoints/oracle_base/best.pt

data_dir:    /root/autodl-tmp/rinshan/data/annotated_v4
val_ratio:   0.02
shuffle_buffer: 15000

belief_weight:     1.0
belief_pos_weight: 2.4

lr:           1e-4
weight_decay: 0.01
warmup_steps: 500
total_steps:  100000
batch_size:   640
grad_accum_steps: 1
max_grad_norm: 0.5
compile: false

dtype: bfloat16
amp:   true

save_dir:   /root/autodl-tmp/rinshan/checkpoints/stage2_base
save_every: 5000
log_every:  100
val_every:  5000
patience:   8

device:      cuda
num_workers: 16
