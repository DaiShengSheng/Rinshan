# Stage 1: 行为克隆 (Nano 规模，快速验证用)

stage: 1
model_preset: nano

data_dir: data/annotated_grp
val_ratio: 0.05
shuffle_buffer: 1000

lr: 3e-4
weight_decay: 0.1
warmup_steps: 500
total_steps: 20_000
batch_size: 64
grad_accum_steps: 1
max_grad_norm: 1.0

dtype: float32
amp: false

save_dir: checkpoints/stage1_nano
save_every: 2000
log_every: 50
val_every: 500

device: cuda
num_workers: 2
