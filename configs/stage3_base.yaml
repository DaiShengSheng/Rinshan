# Stage 3: 离线 IQL

stage: 3
model_preset: base
stage1_ckpt: checkpoints/stage1_base/best.pt

data_dir: data/annotated_grp
val_ratio: 0.02
shuffle_buffer: 5000

lr: 3e-5
weight_decay: 0.01
warmup_steps: 500
total_steps: 300_000      # batch=512 accum=1 → effective 512/step，翻倍步数补回原 153.6M 数据量
batch_size: 512           # target_model double forward 已考虑
grad_accum_steps: 1       # 去掉 accum，effective batch=512，吞吐 ~2x，显存不变
max_grad_norm: 1.0

# IQL 超参
target_update_every: 100

dtype: bfloat16
amp: true
compile: true

save_dir: checkpoints/stage3_base
save_every: 10000
log_every: 200
val_every: 4000

device: cuda
num_workers: 16
pin_memory: true
