# Stage 3: 离线 IQL

stage: 3
model_preset: base
stage1_ckpt: checkpoints/stage1_base/best.pt
stage2_ckpt: checkpoints/stage2_best.pt

data_dir: data/annotated_grp
# 注意：GRP 2.0 不再把每局 reward 广播到所有 action。
# MjaiDataset(stage=3) 会仅在 GRP 游戏状态变化时把 reward 记到该局最后一个 action。
val_ratio: 0.02
shuffle_buffer: 5000

lr: 1e-4
weight_decay: 0.01
warmup_steps: 100
total_steps: 150_000
weights_only_save: false
batch_size: 1024          # compile=True 下 93GB/96GB，effective batch=2048
grad_accum_steps: 2       # 等效 batch=1024
max_grad_norm: 1.0

# CQL 稳定性保护（spike 过一次，小幅降权重）
cql_weight: 0.1     # 凤凰桌专家数据，质量高，弱化保守约束
bc_weight: 0.2      # GRP 2.0: advantage-weighted BC anchor
reward_clip: 20.0   # GRP 2.0: shaped reward clip
value_clip: 50.0    # Stage3 value/q clip
adv_clip: 20.0      # AWR advantage clip
awr_temperature: 3.0
awr_max_weight: 20.0

# IQL 超参
target_update_every: 100

dtype: bfloat16
amp: true
compile: true

save_dir: checkpoints/stage3_base
save_every: 5000
log_every: 100
val_every: 2000

device: cuda
num_workers: 16
pin_memory: true
