# Stage 4: 自对弈数据生成 & 在线 RL 配置

stage: 4
model_preset: base

# 从 Stage 3 初始化
stage3_ckpt: checkpoints/stage3_base/best.pt

# 自对弈参数
self_play:
  n_games_per_iter: 64        # 每轮自对弈局数
  n_agents: 1                 # 参与自对弈的 AI 实例数（1=四家同模型）
  game_length: hanchan        # hanchan / tonpuu
  temperature: 0.8
  top_p: 0.9
  greedy: false
  output_dir: data/self_play  # 自对弈数据保存目录

# 在线训练参数
n_iters: 100                  # 训练迭代轮数（自对弈 + 训练交替）
train_steps_per_iter: 1000    # 每轮训练步数
batch_size: 32
lr: 1e-5
weight_decay: 0.01
max_grad_norm: 1.0

# IQL 超参（继承 Stage 3）
gamma: 0.99
iql_expectile: 0.9
cql_weight: 0.3
target_update_every: 200

dtype: bfloat16
amp: true

save_dir: checkpoints/stage4_base
save_every: 10              # 每 N 轮保存一次
log_every: 50

device: cuda
